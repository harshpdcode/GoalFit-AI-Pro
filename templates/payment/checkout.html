{% extends 'base.html' %}
{% block content %}
<div class="container-fluid py-4 d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-6 col-lg-5 text-center">
        <div class="gf-card" data-aos="zoom-in">
            <div class="card-body p-5">
                <i data-lucide="shield-check" style="stroke: var(--success); margin-bottom: 20px; width: 48px; height: 48px; margin-left: auto; margin-right: auto; display: block;"></i>
                <h3 class="fw-bold mb-3" style="color: var(--text-primary);">Secure Payment</h3>
                <p style="color: var(--text-muted); margin-bottom: 30px; font-size: 0.95rem;">
                    You are about to pay <strong style="color: var(--accent-primary);">₹{{ plan.price }}</strong> to hire <strong style="color: var(--text-primary);">{{ professional.full_name }}</strong> for the <strong style="color: var(--text-primary);">{{ plan.plan_type }}</strong> plan.
                </p>

                <!-- Hidden form to process successful payment -->
                <form id="payment-form" action="/payment/success" method="POST">
                    <input type="hidden" name="razorpay_payment_id" id="razorpay_payment_id">
                    <input type="hidden" name="hire_request_id" value="{{ hire_request_id }}">
                    <input type="hidden" name="amount" value="{{ amount }}">
                </form>

                <button id="rzp-button1" class="save-btn w-100 py-3 fw-bold fs-5" style="border:none; margin-top: 10px;">
                    Pay ₹{{ plan.price }} Now
                </button>
                <p class="small mt-4 mb-0" style="color: var(--text-muted);"><i data-lucide="lock" style="width:12px; stroke: currentColor;"></i> Securely processed by Razorpay</p>
            </div>
        </div>
    </div>
</div>

<!-- Razorpay Script -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
var options = {
    "key": "{{ key_id }}", 
    "amount": "{{ amount }}", 
    "currency": "INR",
    "name": "GoalFit AI",
    "description": "Hire Professional - {{ professional.full_name }}",
    "image": "https://example.com/your_logo",
    {% if order_id %}
    "order_id": "{{ order_id }}",
    {% endif %}
    "handler": function (response){
        // Populate hidden fields and submit form
        document.getElementById('razorpay_payment_id').value = response.razorpay_payment_id;
        document.getElementById('payment-form').submit();
    },
    "prefill": {
        "name": "{{ session.get('user_name', '') }}",
        "email": "{{ session.get('email', '') }}"
    },
    "theme": {
        "color": "#007BFF"
    }
};

{% if key_id == 'rzp_test_placeholder' or not key_id %}
    // MOCK PAYMENT FOR DEMO PURPOSES
    document.getElementById('rzp-button1').onclick = function(e){
        e.preventDefault();
        alert("Razorpay is in placeholder mode. Simulating successful payment...");
        document.getElementById('razorpay_payment_id').value = "pay_mock_" + Math.floor(Math.random() * 1000000);
        document.getElementById('payment-form').submit();
    }
{% else %}
    var rzp1 = new Razorpay(options);
    document.getElementById('rzp-button1').onclick = function(e){
        rzp1.open();
        e.preventDefault();
    }
{% endif %}
</script>
{% endblock %}

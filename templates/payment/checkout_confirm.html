{% extends 'base.html' %}
{% block content %}
<div class="container-fluid py-4 d-flex justify-content-center align-items-center">
    <div class="col-md-6 col-lg-5">
        <div class="gf-card" data-aos="fade-up">
            <div class="card-body p-4 text-center">
                <img src="/{{ professional.profile_photo if professional.profile_photo else 'static/images/profile_img/default_prof.jpg' }}" class="rounded-circle mb-3" style="width: 100px; height: 100px; object-fit: cover; border: 3px solid var(--primary-color);" onerror="this.onerror=null; this.src='/static/images/profile_img/default_prof.jpg';">
                <h4 class="fw-bold mb-1" style="color: var(--text-primary);">Hire {{ professional.full_name }}</h4>
                <p class="mb-4" style="color: var(--text-secondary); font-size: 0.9rem;">{{ professional.role | title }}</p>

                <div class="rounded p-3 mb-4 text-start" style="background: var(--bg-body); border: 1px solid var(--border-color);">
                    <h6 class="fw-bold text-gradient mb-2">Plan Details</h6>
                    <div class="d-flex justify-content-between mb-1">
                        <span style="color: var(--text-secondary);">Plan Name:</span>
                        <span class="fw-bold">{{ plan.plan_type }}</span>
                    </div>
                    <div class="d-flex justify-content-between mb-1">
                        <span style="color: var(--text-secondary);">Duration:</span>
                        <span class="fw-bold" style="color: var(--text-primary);">{{ plan.duration_days }} Days</span>
                    </div>
                    <div class="d-flex justify-content-between pt-2 mt-2" style="border-top: 1px dashed var(--border-color);">
                        <span style="color: var(--text-secondary);">Total Amount:</span>
                        <span class="fw-bold text-success fs-5">₹{{ plan.price }}</span>
                    </div>
                </div>

                <form method="POST" action="/payment/checkout/{{ professional.id }}/{{ plan.id }}">
                    <button type="submit" class="btn btn-primary w-100 rounded-pill py-2" style="background: var(--gradient-primary); border:none;">
                        Proceed to Payment
                    </button>
                </form>
                <a href="/marketplace/profile/{{ professional.id }}" class="btn btn-link text-muted mt-2 text-decoration-none">Cancel</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

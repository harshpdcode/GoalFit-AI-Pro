{% extends "admin/admin_base.html" %}

{% block breadcrumb %}
<a href="/admin/meals">Meals</a>
<span class="breadcrumb-sep">/</span>
<span class="breadcrumb-active">{{ 'Edit' if meal else 'Add New' }} Meal</span>
{% endblock %}

{% block content %}

<h1 class="page-title" data-aos="fade-up">{{ 'Edit' if meal else 'Add New' }} <span>Meal</span></h1>
<div class="accent-line"></div>

<div class="admin-form-card" data-aos="fade-up" data-aos-delay="100">
    <form method="POST" class="admin-form">
        
        <div class="form-grid">
            <div class="form-group">
                <label>Meal Name</label>
                <input type="text" name="meal_name" value="{{ meal.meal_name if meal else '' }}" required placeholder="e.g. Oatmeal Power Bowl">
            </div>

            <div class="form-group">
                <label>Meal Time</label>
                <select name="meal_time" required>
                    <option value="Breakfast" {{ 'selected' if meal and meal.meal_time == 'Breakfast' }}>Breakfast</option>
                    <option value="Lunch" {{ 'selected' if meal and meal.meal_time == 'Lunch' }}>Lunch</option>
                    <option value="Dinner" {{ 'selected' if meal and meal.meal_time == 'Dinner' }}>Dinner</option>
                    <option value="snacks" {{ 'selected' if meal and meal.meal_time == 'snacks' }}>Snacks</option>
                </select>
            </div>

            <div class="form-group">
                <label>Calories</label>
                <input type="number" name="calories" value="{{ meal.calories if meal else '' }}" required placeholder="e.g. 300">
            </div>

            <div class="form-group">
                <label>Proteins (g)</label>
                <input type="number" step="0.1" name="proteins" value="{{ meal.proteins if meal else '' }}" required placeholder="e.g. 10">
            </div>

            <div class="form-group">
                <label>Carbs (g)</label>
                <input type="number" step="0.1" name="carbs" value="{{ meal.carbs if meal else '' }}" required placeholder="e.g. 40">
            </div>

            <div class="form-group">
                <label>Fats (g)</label>
                <input type="number" step="0.1" name="fats" value="{{ meal.fats if meal else '' }}" required placeholder="e.g. 5">
            </div>

            <div class="form-group">
                <label>Diet Type</label>
                <select name="diet_type" required>
                    <option value="Vegetarian" {{ 'selected' if meal and meal.diet_type == 'Vegetarian' }}>Vegetarian</option>
                    <option value="Non-Vegetarian" {{ 'selected' if meal and meal.diet_type == 'Non-Vegetarian' }}>Non-Vegetarian</option>
                    <option value="Vegan" {{ 'selected' if meal and meal.diet_type == 'Vegan' }}>Vegan</option>
                </select>
            </div>

            <div class="form-group">
                <label>Goal Type</label>
                <select name="goal_type" required>
                    <option value="Weight Loss" {{ 'selected' if meal and meal.goal_type == 'Weight Loss' }}>Weight Loss</option>
                    <option value="Weight Gain" {{ 'selected' if meal and meal.goal_type == 'Weight Gain' }}>Weight Gain</option>
                </select>
            </div>

            <div class="form-group">
                <label>Option Group</label>
                <input type="number" name="option_group" value="{{ meal.option_group if meal else 1 }}" required min="1">
            </div>

            <div class="form-group full-span">
                <label>Image Path</label>
                <input type="text" name="img_src" value="{{ meal.img_src if meal else 'static/images/diet/salad.jpeg' }}" placeholder="static/images/diet/...">
            </div>
        </div>

        <div class="form-actions">
            <a href="/admin/meals" class="admin-btn secondary">Cancel</a>
            <button type="submit" class="admin-btn primary">
                <i data-lucide="save"></i> {{ 'Update' if meal else 'Create' }} Meal
            </button>
        </div>
    </form>
</div>

{% endblock %}

{% block scripts %}
<script>lucide.createIcons();</script>
{% endblock %}
